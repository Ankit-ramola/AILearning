<div class="main">
  <table>
    <tr>
      <th>Name</th>
      <th>Email</th>
    </tr>
    <tr *ngFor="let user of finalArray">
      <td>{{user.name}}</td>
      <td>{{user.email}}</td>
    </tr>
  </table>
  <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">
    <div>
      <label>Username</label>
      <input type="text" formControlName="username" />
      <div *ngIf="registrationForm.get('username')?.invalid && registrationForm.get('username')?.touched">Error</div>
    </div>
    <div>
      <label>Email</label>
      <input type="email" formControlName="email" />
    </div>
    <div>
      <label>Gender</label>
      <select formControlName="gender">
        <option *ngFor="let g of genders" [value]="g.value">{{g.label}}</option>
      </select>
    </div>
    <button type="submit">Submit</button>
  </form>
</div>
